name: CI

on:
  push:
    branches: [main]
  pull_request:

# Least privilege by default; jobs opt into more only where needed.
permissions:
  contents: read

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4

      - name: Install fish
        run: |
          sudo apt-get update
          sudo apt-get install -y fish

      - name: Install just
        uses: extractions/setup-just@dd310ad5a97d8e7b41793f8ef055398d51ad4de6 # v2

      - name: Install fishtape (pinned)
        run: |
          git clone --depth 1 --branch 3.0.1 \
            https://github.com/jorgebucaran/fishtape "$RUNNER_TEMP/fishtape"
          mkdir -p ~/.config/fish/functions
          cp "$RUNNER_TEMP/fishtape"/functions/*.fish ~/.config/fish/functions/

      - name: Lint (syntax + formatting)
        run: just lint

      - name: Test (fishtape with mocked CLIs)
        run: just test

  # Security audit of the shipped files. Runs on PRs, posts a sticky comment
  # with the result (clean or findings), and fails the check on findings.
  # Scope note: this defends against contributor mistakes, not a rogue
  # maintainer — see SECURITY.md.
  audit:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write # to post/update the sticky audit comment
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4

      - name: Install fish
        run: |
          sudo apt-get update
          sudo apt-get install -y fish

      - name: Run audit
        id: audit
        run: |
          set +e
          out="$(fish scripts/audit.fish 2>&1)"
          code=$?
          set -e
          # Expose the report body and outcome to later steps.
          {
            echo 'report<<AUDIT_EOF'
            echo "$out"
            echo 'AUDIT_EOF'
          } >>"$GITHUB_OUTPUT"
          if [ "$code" -eq 0 ]; then
            echo "outcome=clean" >>"$GITHUB_OUTPUT"
          else
            echo "outcome=findings" >>"$GITHUB_OUTPUT"
          fi

      - name: Post sticky audit comment
        # Forked-PR tokens are read-only, so commenting is skipped there; the
        # audit result still gates the check via the "Fail on findings" step.
        if: github.event.pull_request.head.repo.full_name == github.repository
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7
        env:
          OUTCOME: ${{ steps.audit.outputs.outcome }}
          REPORT: ${{ steps.audit.outputs.report }}
        with:
          script: |
            const marker = '<!-- audit-report -->';
            const outcome = process.env.OUTCOME;
            const report = process.env.REPORT || '';
            const heading = outcome === 'clean'
              ? '✅ **Security audit: clean** — no high-signal dangerous patterns in shipped files.'
              : '🚨 **Security audit: findings** — review the flagged lines before merging.';
            const body = [
              marker,
              heading,
              '',
              '```',
              report.trim(),
              '```',
              '',
              '_Scope: this scan catches obviously-dangerous shell patterns from contributors ' +
              'or mistakes. It is **not** a defense against a malicious maintainer — see ' +
              '`SECURITY.md`._',
            ].join('\n');

            const { owner, repo } = context.repo;
            const issue_number = context.issue.number;
            const { data: comments } = await github.rest.issues.listComments({
              owner, repo, issue_number, per_page: 100,
            });
            const existing = comments.find(c => c.body && c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({ owner, repo, comment_id: existing.id, body });
            } else {
              await github.rest.issues.createComment({ owner, repo, issue_number, body });
            }

      - name: Fail on findings
        if: steps.audit.outputs.outcome == 'findings'
        run: |
          echo "Audit found high-signal dangerous patterns; see the PR comment." >&2
          exit 1
